<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 서비스 허브</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #e0e7ff;
    --bg: #f8fafc;
    --surface: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --sidebar-w: 220px;
    --topnav-h: 60px;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP NAV ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topnav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 8px;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,.06);
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--primary);
    margin-right: 24px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .top-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .top-tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    transition: all .2s;
    white-space: nowrap;
  }

  .top-tab:hover { background: var(--primary-light); color: var(--primary); }
  .top-tab.active { background: var(--primary); color: #fff; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    margin-top: var(--topnav-h);
    min-height: calc(100vh - var(--topnav-h));
  }

  /* ── SIDEBAR ── */
  aside {
    position: fixed;
    top: var(--topnav-h);
    left: 0;
    bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 12px;
  }

  .side-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .side-btn {
    display: block;
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--text-muted);
    text-align: left;
    transition: all .18s;
    font-weight: 500;
  }

  .side-btn:hover { background: var(--primary-light); color: var(--primary); }
  .side-btn.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }

  /* ── MAIN CONTENT ── */
  main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 32px 36px;
    max-width: 1200px;
  }

  .section-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .section-sub {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* ── CARD GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    cursor: pointer;
    transition: all .22s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--primary);
    opacity: 0;
    transition: opacity .2s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(99,102,241,.15);
    border-color: var(--primary-light);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .card-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }

  .card-badge {
    font-size: 0.72rem;
    background: var(--primary-light);
    color: var(--primary);
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
    align-self: flex-start;
  }

  .card-link {
    font-size: 0.78rem;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
    font-weight: 500;
  }

  /* ── ALL VIEW ── */
  .cat-section { margin-bottom: 48px; }
  .cat-section h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cat-section h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>

let currentCat = Object.keys(DB)[0];
let currentSub = Object.keys(DB[currentCat].subs)[0];

function renderTopTabs() {
  const container = document.getElementById('topTabs');
  container.innerHTML = Object.entries(DB).map(([cat, val]) =>
    `<button class="top-tab ${cat === currentCat ? 'active' : ''}" onclick="selectCat('${cat}')">
      ${val.icon} ${cat}
    </button>`
  ).join('');
}

function renderSidebar() {
  const subs = Object.keys(DB[currentCat].subs);
  document.getElementById('sideContent').innerHTML =
    `<div class="side-label">${currentCat}</div>` +
    subs.map(sub =>
      `<button class="side-btn ${sub === currentSub ? 'active' : ''}" onclick="selectSub('${sub}')">
        ${sub}
      </button>`
    ).join('');
}

function renderCards(items) {
  return `<div class="card-grid">` +
    items.map(item =>
      `<a class="card" href="${item.url}" target="_blank" rel="noopener">
        <div class="card-icon">${item.icon}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-badge">${item.badge}</div>
        <div class="card-link">↗ 바로가기</div>
      </a>`
    ).join('') +
    `</div>`;
}

function renderMain() {
  const catData = DB[currentCat];
  const isAll = currentSub === '__all__';
  const main = document.getElementById('mainContent');

  if (isAll) {
    let html = `<div class="section-title">${catData.icon} ${currentCat}</div>
      <div class="section-sub">${catData.desc}</div>`;
    Object.entries(catData.subs).forEach(([sub, items]) => {
      html += `<div class="cat-section">
        <h2>${sub}</h2>
        ${renderCards(items)}
      </div>`;
    });
    main.innerHTML = html;
  } else {
    const items = catData.subs[currentSub];
    main.innerHTML = `
      <div class="section-title">${currentSub}</div>
      <div class="section-sub">${catData.desc}</div>
      ${renderCards(items)}
    `;
  }
}

function selectCat(cat) {
  currentCat = cat;
  currentSub = '__all__';
  renderTopTabs();
  renderSidebar();
  renderMain();
  updateSideAll();
}

function selectSub(sub) {
  currentSub = sub;
  renderSidebar();
  renderMain();
  updateSideAll();
}

function updateSideAll() {
  const allBtn = document.getElementById('allBtn');
  if (allBtn) allBtn.className = `side-btn ${currentSub === '__all__' ? 'active' : ''}`;
}

function init() {
  currentSub = '__all__';
  renderTopTabs();

  // Sidebar: add "전체 보기" + sub list
  const subs = Object.keys(DB[currentCat].subs);
  document.getElementById('sideContent').innerHTML =
    `<div class="side-label">${currentCat}</div>
     <button id="allBtn" class="side-btn active" onclick="selectAllSub()">전체 보기</button>` +
    subs.map(sub =>
      `<button class="side-btn" onclick="selectSub('${sub}')">${sub}</button>`
    ).join('');

  renderMain();
}

function selectAllSub() {
  currentSub = '__all__';
  renderSidebar2();
  renderMain();
}

function renderSidebar2() {
  const subs = Object.keys(DB[currentCat].subs);
  document.getElementById('sideContent').innerHTML =
    `<div class="side-label">${currentCat}</div>
     <button id="allBtn" class="side-btn ${currentSub === '__all__' ? 'active' : ''}" onclick="selectAllSub()">전체 보기</button>` +
    subs.map(sub =>
      `<button class="side-btn ${sub === currentSub ? 'active' : ''}" onclick="selectSub('${sub}')">${sub}</button>`
    ).join('');
}

// Override renderSidebar to include "전체 보기"
function renderSidebar() {
  renderSidebar2();
}

// Override selectCat
function selectCat(cat) {
  currentCat = cat;
  currentSub = '__all__';
  renderTopTabs();
  renderSidebar2();
  renderMain();
}

init();
</script>
</body>
</html>
